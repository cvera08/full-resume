award:
  show: true
  order: 4
  title: KEY ACHIEVEMENTS
  description: |
    - Designed and deployed **LLM and agent evaluation pipelines** integrated into CI/CD, enabling continuous quality validation for AI-powered products.
    - Built test automation frameworks from scratch using **Playwright and TypeScript**, adopted across multiple product teams as the standard automation layer.
    - Reduced bug rates by **18%** and increased test automation efficiency by **20%** by leading a 5-person QA team through a full framework overhaul.
    - Cut test execution time by **40%** (from 2+ hours to under one) by parallelizing automation suites across four concurrent runners.
    - Unblocked **400+ regression tests** by engineering a 2FA/MFA bypass solution for authenticated test flows.
    - Reduced environment setup time by **50%** through a data generation framework using GraphQL to automate dynamic test data creation.
    - Increased test efficiency by **27%** by building a new Playwright framework replacing a legacy stack.
    - Applied **adversarial testing and red-teaming** techniques to validate non-deterministic AI outputs, contributing to production observability for LLM-based systems.
    - Achieved **23% decrease in post-release defects** at Socure by establishing automated mobile testing on native iOS using XCUITest and real device coverage.


skill:
  show: true
  order: 5
  title: PROFESSIONAL SKILLS
  description: |  
    - <u>Leadership & Strategic Thinking</u>: Led QA teams of up to 5 engineers as Automation Lead and Automation Architect. Defines quality strategy for AI-powered products, aligning test and evaluation coverage with engineering and product priorities.
    - <u>Collaboration & Communication</u>: Effective communicator across engineering, product, and stakeholder teams. Experienced working as the sole QA in cross-functional squads, owning the full quality layer end to end.
    - <u>Problem-Solving & Continuous Improvement</u>: Systematic approach to diagnosing failures in non-deterministic systems, improving pipelines, and scaling test architecture. Applies the same engineering rigor to AI evaluation as to traditional automation.


reference:
  show: true
  order: 6
  title: MAIN RESPONSIBILITIES
  description: |
    - Design and implement **test and evaluation frameworks** for AI-powered products, covering LLM outputs, agent behavior, and non-deterministic system validation — integrated into CI/CD pipelines from day one.
    - Define and apply **LLM evaluation strategies**: reference-based and reference-free methods, LLM-as-a-judge, RAG pipeline evaluation, adversarial testing, and production observability with tools like Evidently AI, LangSmith, and Langfuse.
    - Build and maintain **end-to-end test automation** across web, mobile, and backend platforms using Playwright, TypeScript, Python, and GitHub Actions — covering both greenfield and legacy systems.
    - Partner with Engineering, Product, and AI teams to align **quality and evaluation coverage** with business requirements, model behavior expectations, and user-facing risk.
    - Establish **best practices for scalable, observable test automation** within Agile squads, including reusable datasets, environment management, and CI/CD-integrated reporting.
    - Analyze failures in probabilistic systems, lead **root cause analysis**, and translate findings into actionable improvements across the test and evaluation stack.

