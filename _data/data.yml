profile:
  show: true
  order: 1
  title: PROFESSIONAL SUMMARY
  description: |
    Playwright · TypeScript · Python · CI/CD with GitHub Actions  
    LLM & Agent Evaluation · AI Observability · Test Automation Architecture  
    Remote Contractor (US Timezones)  
    <br>
    **AI Quality Engineer & QA Automation Architect** with 16+ years of experience building test and evaluation frameworks that ship reliable software — including AI-powered products.
    <br>
    Designs and implements automated test and evaluation pipelines using **Playwright, TypeScript, and Python**, integrated into CI/CD (GitHub Actions). Applies LLM evaluation techniques including reference-based and reference-free methods, **LLM-as-a-judge**, **RAG evaluation**, and **adversarial testing** to validate non-deterministic AI systems in production.
    <br>
    Known for translating quality risk into engineering solutions: **scalable frameworks**, **observable pipelines**, and **actionable metrics** across web, mobile, backend, and AI-powered platforms.

evaluation:
  show: true
  order: 2
  title: About Me
  description: |
    I've spent 16 years finding what breaks. Now I engineer quality into systems that fail in new ways: AI-powered products.

    <br>

    I built test automation that shipped real software across web, mobile, and backend. Then I moved to the front line of modern QA, owning quality for products that embed LLMs and agents, where outputs hallucinate, drift, and behave probabilistically.

    <br>

    I'm an **AI Quality Engineer** & QA Automation Architect. I design the test and evaluation frameworks that let teams ship AI features with confidence, and I wire them into CI/CD so quality is continuous, not a one-off audit.

    <br>

    **What I do:**
    Build automated test and evaluation pipelines for AI-powered products using Playwright/TypeScript and Python, integrated into CI/CD (GitHub Actions). **LLM and agent evaluation**: reference-based and reference-free methods, **LLM-as-a-judge**, RAG evaluation, adversarial testing and red-teaming. Production observability and regression tracking for non-deterministic systems (Evidently AI, LangSmith, Langfuse).

    <br>

    **Where I come from:**
    **Systems Engineer** (UTN) · ISTQB-certified · Test automation architecture · Past clients include EY, PwC, and Renault-Nissan.

    <br>

    **What I'm building:**
    #AITestingJourney — a public R&D log turning the eval techniques above into things that actually run in a pipeline.

interest:
